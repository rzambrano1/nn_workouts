# @package _global_

# Using Hydra's official Optuna plugin (hydra-optuna-sweeper), substitutes objective.py, run_sweep.py, or callbacks.py
# Run HPO with $python train.py --multirun hydra/sweeper=optuna +hpo=optuna

hydra:
  sweeper:
    sampler:
      _target_: optuna.samplers.TPESampler # The Bayesian optimizer
      seed: 42
    direction: minimize # Minimize the loss
    study_name: mlp_optimization
    storage: null
    n_trials: 20
    n_jobs: 1

    # Search space
    params:
      training.learning_rate: interval(0.0001, 0.1) # Log-uniform search
      model.neurons_in_hidden_layer_1: choice(2, 4, 8, 16)
      model.neurons_in_hidden_layer_2: choice(2, 4, 8, 16)